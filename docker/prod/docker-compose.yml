services:
  web:
    build:
      context: ../../
      dockerfile: docker/prod/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.prod
      - ALLOWED_HOSTS=*
    depends_on:
      - db

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: pasteles
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: strongpassword
    volumes:
      - postgres_data:/var/lib/postgresql/data/

volumes:
  postgres_data:
